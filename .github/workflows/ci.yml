name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # build.sh is pure bash and vault_health.py is stdlib-only, but the
      # free-research source library imports `requests`, so install that too.
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest requests
      - name: Run smoke tests
        run: pytest -q
